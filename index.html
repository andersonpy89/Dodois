<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dodô</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <text y='0.9em' font-size='90'>🦤</text>
  </svg>">
</head>

<body>

  <div id="app"></div>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="js/firebase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>

 
  <!-- ============================= -->
  <!-- MODAL RECORRÊNCIA DODÔ -->
  <!-- ============================= -->

  <div id="recurrence-modal-overlay" class="recurrence-modal-overlay">
    <div class="recurrence-modal">
      <h3>Editar recorrência</h3>
      <p>Como deseja aplicar a alteração?</p>

      <div class="recurrence-options">
        <label>
          <input type="radio" name="recurrence-option" value="single" checked>
          Apenas esta transação
        </label>

        <label>
          <input type="radio" name="recurrence-option" value="future">
          Esta e as futuras
        </label>

        <label>
          <input type="radio" name="recurrence-option" value="all">
          Todas da série
        </label>
      </div>

      <div class="recurrence-actions">
        <button id="recurrence-cancel" class="btn-cancel">Cancelar</button>
        <button id="recurrence-confirm" class="btn-confirm">Aplicar</button>
      </div>
    </div>
  </div>

</body>
</html>
